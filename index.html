<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var theme = localStorage.getItem('dropwhen-theme')
        var isDark = theme === 'dark'
        document.documentElement.classList.add(isDark ? 'dark' : 'light')
        document.documentElement.dataset.theme = isDark ? 'dark' : 'violet'
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff4e5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta
      name="description"
      content="DropWhen — Recherchez les dates de sortie de jeux vidéo et BD/comics, puis planifiez-les dans votre agenda."
    />
    <title>DropWhen</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
